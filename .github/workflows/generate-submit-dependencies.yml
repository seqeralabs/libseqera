name: Generate and submit dependency graph for libseqera
on:
  push:
    branches: ['master']

permissions:
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        components: [
          "lib-jedis-lock",
          "lib-activator",
          "lib-cache-tiered-redis",
          "lib-commons-io",
          "lib-crypto",
          "lib-docker-cli",
          "lib-data-broadcast-redis",
          "lib-data-count-redis",
          "lib-data-queue-redis",
          "lib-data-range-redis",
          "lib-data-store-future-redis",
          "lib-data-store-state-redis",
          "lib-data-stream-redis",
          "lib-fixtures-redis",
          "lib-hashx",
          "lib-lang",
          "lib-lock",
          "lib-lock-redis",
          "lib-httpx",
          "lib-mail",
          "lib-pairing",
          "lib-platform-oidc",
          "lib-pool",
          "lib-random",
          "lib-retry",
          "lib-serde",
          "lib-serde-gson",
          "lib-serde-moshi",
          "lib-serde-jackson",
          "lib-trace",
          "lib-util-http",
          "lib-util-string",
          "lib-util-time",
          "lib-jedis-pool",
          "lib-cmd-queue-redis",
          "lib-cloudinfo",
          "micronaut-cache-redis"
        ]
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        distribution: temurin
        java-version: 17

    - name: Generate and submit dependency graph for libseqera
      uses: gradle/actions/dependency-submission@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      with:
        dependency-resolution-task: ":${{ matrix.components }}:dependencies"
        additional-arguments: "--configuration runtimeClasspath"
        dependency-graph: generate-and-submit
